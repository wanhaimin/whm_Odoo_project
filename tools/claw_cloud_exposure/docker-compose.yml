services:
  caddy:
    image: caddy:2.8.4-alpine
    container_name: claw-caddy-gateway
    restart: unless-stopped
    volumes:
      - ./runtime/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./runtime/logs:/var/log/caddy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: claw-cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      - caddy
    command:
      - tunnel
      - --no-autoupdate
      - --url
      - http://caddy:18070
