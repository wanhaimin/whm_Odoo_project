name: my_odoo_project_devcontainer

services:
  # 数据库服务
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  # 邮件测试服务 (Mailpit)
  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "8025:8025" # Web UI
      - "1026:1025" # SMTP Port

  # Odoo 服务
  web:
    # 这里修改你需要开发的 Odoo 版本，例如 odoo:16.0, odoo:17.0
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    expose:
      - "8069"
      - "8072"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      # 【关键】把你的整个项目根目录挂载到容器的 addons 路径
      # .. 代表上一级目录（即项目根目录）
      - ../custom_addons:/mnt/extra-addons
      # 持久化 Odoo 的 web 数据（如附件等）
      - odoo-web-data:/var/lib/odoo
    command: >
      odoo -d odoo
      --workers=2
      --max-cron-threads=1
      --proxy-mode

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8070:80"
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  odoo-db-data:
  odoo-web-data:
