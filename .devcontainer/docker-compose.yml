name: my_odoo_project_devcontainer

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "8025:8025"
      - "1026:1025"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - /usr/local/bin/start_odoo_with_worker.sh
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8069"
      - "8072"
    environment:
      - DB_HOST=db
      - DB_USER=odoo
      - DB_PASSWORD=odoo
      - CHATTER_AI_WORKER_TOKEN=chatter-ai-local-dev
      - OPENCLAW_COPY_MAIN_WORKSPACE=0
    env_file:
      - .env
    volumes:
      - ../custom_addons:/mnt/extra-addons
      - ${USERPROFILE}/.openclaw:/root/.openclaw
      - odoo-web-data:/var/lib/odoo
    command: >
      -d odoo
      --workers=2
      --max-cron-threads=1
      --proxy-mode
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8069/web/login', timeout=3).read(1)\""]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "8070:80"
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  odoo-db-data:
  odoo-web-data:
