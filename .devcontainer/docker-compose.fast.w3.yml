name: my_odoo_project_devcontainer

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "8025:8025"
      - "1026:1025"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - /usr/local/bin/start_odoo_with_worker.sh
    depends_on:
      - db
    ports:
      - "8070:8069"
    environment:
      - DB_HOST=db
      - DB_USER=odoo
      - DB_PASSWORD=odoo
      - CHATTER_AI_WORKER_TOKEN=chatter-ai-local-dev
    volumes:
      - ../custom_addons:/mnt/extra-addons
      - ${USERPROFILE}/.openclaw:/root/.openclaw
      - odoo-web-data:/var/lib/odoo
    command: >
      -d odoo
      --workers=3
      --max-cron-threads=1

volumes:
  odoo-db-data:
  odoo-web-data:
